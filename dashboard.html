<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>User Dashboard</h1>
    </header>
    <main>
        <section id="balance">
            <h2>Your Balance</h2>
            <p id="balance-amount">$100.00</p>
        </section>
        <section id="services">
            <h2>Available Services</h2>
            <div class="services-grid">
                <div class="service">Service 1</div>
                <div class="service">Service 2</div>
                <div class="service">Service 3</div>
                <div class="service">Service 4</div>
            </div>
        </section>
        <button id="top-up">Top Up</button>
        <section id="orders">
            <h2>Your Orders</h2>
            <table>
                <thead>
                    <tr>
                        <th>Order ID</th>
                        <th>Service</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>#1234</td>
                        <td>Service 1</td>
                        <td>Completed</td>
                    </tr>
                    <tr>
                        <td>#1235</td>
                        <td>Service 2</td>
                        <td>In Progress</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Your Company. All rights reserved.</p>
    </footer>
</body>
</html>
